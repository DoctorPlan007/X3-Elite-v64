<!doctype html>
<html lang="es">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
    <title>X3 — Superinteligencia Élite</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#00d4ff" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="X3" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Iconos -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- SEO / Social -->
    <meta name="description" content="X3 — Superinteligencia patrimonial chilena. Blindaje de salud, finanzas y legal en 60 segundos." />
    <meta name="keywords" content="isapre, salud, finanzas, APV, blindaje patrimonial, Chile" />
    <meta property="og:title" content="X3 — Superinteligencia Élite" />
    <meta property="og:description" content="Analiza, blinda y certifica tu inmunidad financiera." />
    <meta property="og:type" content="website" />

    <!-- Android: evitar zoom en inputs -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Fuentes -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: #060912;
        color: #fff;
        height: 100%;
        /* Android: usa toda la pantalla incluyendo notch */
        height: 100dvh;
        overflow: hidden;
        /* Evitar selección accidental en móvil */
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      #root {
        height: 100%;
        height: 100dvh;
        /* Safe area para notch y barra de navegación Android */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
      /* Splash screen mientras carga */
      #x3-splash {
        position: fixed; inset: 0;
        background: #060912;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #x3-splash.hidden { opacity: 0; pointer-events: none; }
      #x3-splash .logo {
        font-family: 'Orbitron', sans-serif;
        font-size: 3rem; font-weight: 900;
        color: #00d4ff;
        text-shadow: 0 0 30px rgba(0,212,255,0.8), 0 0 60px rgba(0,212,255,0.4);
        animation: pulse 1.5s ease-in-out infinite;
      }
      #x3-splash .sub {
        font-family: 'Share Tech Mono', monospace;
        font-size: 0.65rem; color: rgba(0,212,255,0.6);
        text-transform: uppercase; letter-spacing: 0.2em;
        margin-top: 8px;
      }
      #x3-splash .bar {
        width: 120px; height: 2px;
        background: rgba(0,212,255,0.2);
        border-radius: 2px; margin-top: 24px;
        overflow: hidden;
      }
      #x3-splash .bar-fill {
        height: 100%; width: 0%;
        background: #00d4ff;
        animation: load 1.2s ease-out forwards;
      }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }
      @keyframes load { 0%{width:0%} 100%{width:100%} }
    </style>
  </head>

  <body>
    <!-- Splash screen de carga -->
    <div id="x3-splash">
      <div class="logo">X3</div>
      <div class="sub">Superinteligencia Élite</div>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- Ocultar splash cuando React carga -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const splash = document.getElementById('x3-splash');
          if (splash) {
            splash.classList.add('hidden');
            setTimeout(() => splash.remove(), 600);
          }
        }, 1200);
      });
    </script>

    <!-- Service Worker para funcionamiento offline en Android -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => {
              console.log('[X3] SW registrado:', reg.scope);
              // Verificar actualizaciones cada 60 minutos
              setInterval(() => reg.update(), 60 * 60 * 1000);
            })
            .catch(err => console.warn('[X3] SW no registrado:', err));
        });
      }
    </script>

    <!-- Analytics (no bloquea carga) -->
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
